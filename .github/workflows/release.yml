# 推送形如 v0.1.0 的 tag 时，并行构建 Windows / macOS 安装包并发布到 GitHub Release。
# 使用方式：git tag v0.1.0 && git push origin v0.1.0

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (NSIS)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create bundled venv
        shell: pwsh
        run: |
          python -m venv python/.venv
          python/.venv/Scripts/python -m pip install --upgrade pip

      - name: Install npm dependencies
        run: npm ci

      - name: Build NSIS installer
        run: npm run tauri:build:nsis

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS (DMG)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create bundled venv
        run: |
          python3 -m venv python/.venv
          python/.venv/bin/python -m pip install --upgrade pip

      - name: Install npm dependencies
        run: npm ci

      - name: Build DMG
        run: npm run tauri:build:dmg

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: "*"
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DocConvert ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
